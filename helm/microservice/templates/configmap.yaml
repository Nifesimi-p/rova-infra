apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "microservice.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Release.Namespace | quote }}
  APP_NAME: {{ include "microservice.fullname" . | quote }}