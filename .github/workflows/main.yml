name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  TF_VERSION: "1.7.0"
  HELM_VERSION: "3.14.0"
  DOCKER_IMAGE: preciousnifesi/rova-microservice

jobs:
  terraform-quality-gate:
    name: Terraform Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="environment=dev" \
            -no-color \
            -input=false \
            -refresh=false \
            -out=tfplan
        env:
          TF_VAR_environment: dev
        
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: tfplan
          retention-days: 7

  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: terraform-quality-gate
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-validate:
    name: Helm Lint and Dry Run
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm Lint
        run: |
          helm lint ./helm/microservice \
            --set image.repository=${{ env.DOCKER_IMAGE }} \
            --set image.tag=${{ needs.docker-build-push.outputs.image-tag }} \
            --strict

      - name: Helm Dry Run Dev
        run: |
          helm install rova-dev ./helm/microservice \
            --dry-run \
            --debug \
            --namespace dev \
            --create-namespace \
            --set image.repository=${{ env.DOCKER_IMAGE }} \
            --set image.tag=${{ needs.docker-build-push.outputs.image-tag }} \
            --set ingress.host=api.dev.rova.com

      - name: Helm Dry Run Production
        run: |
          helm install rova-prod ./helm/microservice \
            --dry-run \
            --debug \
            --namespace production \
            --create-namespace \
            --set image.repository=${{ env.DOCKER_IMAGE }} \
            --set image.tag=${{ needs.docker-build-push.outputs.image-tag }} \
            -f ./helm/microservice/values-prod.yaml \
            --set ingress.host=api.rova.com

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - terraform-quality-gate
      - helm-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Awaiting approval
        run: |
          echo "Production deployment approved."
          echo "In a live environment this step would:"
          echo "1. Configure AWS credentials via OIDC"
          echo "2. Update kubeconfig for EKS cluster"
          echo "3. Run helm upgrade --install with --atomic --wait"
          echo "Image that would be deployed: ${{ env.DOCKER_IMAGE }}:${{ needs.docker-build-push.outputs.image-tag }}"